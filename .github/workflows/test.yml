name: Smoke Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Handler registry loads
        run: |
          python -c "
          from rmeta_core.handlers import get_handler_for_extension
          for ext in ('pdf', 'docx', 'xlsx', 'txt'):
              assert get_handler_for_extension(ext) is not None, f'no handler registered for {ext}'
          print('handler registry OK')
          "

      - name: CLI entry point runs
        run: python app.py --version

      - name: Dry-run against a sample file
        run: |
          echo "sample text file for CI smoke test" > sample.txt
          python app.py --dry-run --verbose -f sample.txt
